name: Deploy AuctionsDev

on:
  push:
    branches: ['auctions/**']
  workflow_dispatch:

env:
  BUN_VERSION: 'latest'

concurrency:
  group: deploy-auctionsdev
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.release.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          bun run generate-routes
          bun run build

      - name: Generate release name
        id: release
        run: echo "name=market-auctionsdev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp -r src deploy-package/
          # `contextvm/` ships the path-oracle CVM server (`contextvm/server.ts`)
          # which PM2 launches as `market-contextvm-auctionsdev`. Without
          # this, the rollback log shows
          # `Script not found: /home/.../market-auctionsdev/contextvm/server.ts`.
          cp -r contextvm deploy-package/
          cp package.json bun.lock tsconfig.json deploy-package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package-auctionsdev
          path: deploy-package/
          retention-days: 1

  deploy:
    name: Deploy to AuctionsDev
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package-auctionsdev
          path: deploy-package/

      - name: Create ecosystem config
        run: |
          cat > deploy-package/ecosystem.config.cjs << 'EOF'
          module.exports = {
            apps: [
              {
                name: 'market-auctionsdev',
                script: 'src/index.tsx',
                interpreter: process.env.HOME + '/.bun/bin/bun',
                cwd: '/home/deployer/market-auctionsdev',
                instances: 1,
                exec_mode: 'fork',
                env_file: '.env',
                error_file: '/home/deployer/logs/market-auctionsdev-error.log',
                out_file: '/home/deployer/logs/market-auctionsdev-out.log',
                log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
                merge_logs: true,
                autorestart: true,
                max_restarts: 10,
                min_uptime: '10s',
                restart_delay: 5000,
                max_memory_restart: '500M',
                kill_timeout: 5000,
                wait_ready: true,
                listen_timeout: 10000,
              },
              // Auctionsdev runs its OWN parallel CVM server (a "second
              // oracle") alongside the staging one (`market-contextvm-staging`).
              // Both publish on `wss://relay.staging.plebeian.market` —
              // each with its own pubkey derived from a separate
              // `CVM_SERVER_KEY` — so the auctions/* feature branch can
              // be exercised end-to-end (announcement publishing, gift-
              // wrap mode, oracle-picker discovery) without waiting for
              // the staging CVM to be redeployed via master.
              //
              // Same `cwd` as the web app so they share `.env` (same
              // APP_RELAY_URL, APP_STAGE=staging, CVM_SERVER_KEY).
              // Bidder/seller clients on auctionsdev will see BOTH
              // oracles in the picker (staging's + auctionsdev's), with
              // auctionsdev's pre-selected because it's what
              // `/api/config.cvmServerPubkey` resolves to here.
              {
                name: 'market-contextvm-auctionsdev',
                script: 'contextvm/server.ts',
                interpreter: process.env.HOME + '/.bun/bin/bun',
                cwd: '/home/deployer/market-auctionsdev',
                instances: 1,
                exec_mode: 'fork',
                env_file: '.env',
                error_file: '/home/deployer/logs/market-contextvm-auctionsdev-error.log',
                out_file: '/home/deployer/logs/market-contextvm-auctionsdev-out.log',
                log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
                merge_logs: true,
                autorestart: true,
                max_restarts: 10,
                min_uptime: '10s',
                restart_delay: 5000,
                max_memory_restart: '500M',
                kill_timeout: 5000,
              },
            ],
          };
          EOF

      - name: Create environment file
        run: |
          cat > deploy-package/.env << EOF
          APP_STAGE=staging
          NODE_ENV=production
          PORT=3002
          APP_RELAY_URL=${{ secrets.STAGING_RELAY_URL }}
          APP_PRIVATE_KEY=${{ secrets.STAGING_APP_PRIVATE_KEY }}
          # Auctionsdev runs its OWN CVM server with a dedicated key so
          # it announces itself separately from `market-contextvm-staging`
          # on `wss://relay.staging.plebeian.market`. The web app's
          # `/api/config.cvmServerPubkey` is derived from this same key,
          # so the auctionsdev oracle picker pre-selects the auctionsdev
          # oracle (the staging one still appears as a second option).
          # Falls back to STAGING_CVM_SERVER_KEY if the dedicated secret
          # isn't set yet — running both apps under the same key just
          # means PM2 spawns a duplicate signer; the duplicate will lose
          # the announcement race but is otherwise harmless.
          CVM_SERVER_KEY=${{ secrets.AUCTIONSDEV_CVM_SERVER_KEY || secrets.STAGING_CVM_SERVER_KEY }}
          NIP46_RELAY_URL=wss://relay.nsec.app
          EOF

      - name: Prepare server directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            mkdir -p ~/releases ~/logs
            chmod 755 ~
            rm -rf ~/deploy-package
            mkdir -p ~/deploy-package
            chmod 755 ~/deploy-package
            rm -f ~/Caddyfile.staging
            rm -f ~/deploy-package.tar.gz ~/caddyfile-staging.tar.gz

      - name: Upload files to tmp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          source: 'deploy-package/*'
          target: '/home/deployer/deploy-package'
          strip_components: 1
          tar_tmp_path: '/home/deployer/deploy-package.tar.gz'

      - name: Upload Caddyfile
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          source: 'deploy-simple/caddyfiles/Caddyfile.staging'
          target: '/home/deployer'
          strip_components: 2
          tar_tmp_path: '/home/deployer/caddyfile-staging.tar.gz'

      - name: Move files to release directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            mv ~/deploy-package ~/releases/${{ needs.build.outputs.release_name }}

      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/deployer/releases/${{ needs.build.outputs.release_name }}"
            APP_DIR="/home/deployer/market-auctionsdev"
            PREVIOUS_RELEASE="$(readlink -f "$APP_DIR" || true)"
            CADDY_BACKUP="$(mktemp "$HOME/caddy-backup.XXXXXX")"
            sudo cp /etc/caddy/Caddyfile "$CADDY_BACKUP" 2>/dev/null || true

            rollback() {
              echo "Deployment failed, restoring previous release"
              if [[ -f "$CADDY_BACKUP" ]]; then
                sudo cp "$CADDY_BACKUP" /etc/caddy/Caddyfile || true
                sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
              fi
              if [[ -n "$PREVIOUS_RELEASE" && -d "$PREVIOUS_RELEASE" ]]; then
                ln -sfn "$PREVIOUS_RELEASE" "$APP_DIR"
                cd "$APP_DIR"
                pm2 startOrReload ecosystem.config.cjs --only market-auctionsdev || true
                pm2 startOrReload ecosystem.config.cjs --only market-contextvm-auctionsdev || true
                pm2 save --force || true
              fi
            }

            trap rollback ERR

            cd "$RELEASE_DIR"
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --production

            pm2 stop market-auctionsdev 2>/dev/null || true
            pm2 stop market-contextvm-auctionsdev 2>/dev/null || true

            ln -sfn "$RELEASE_DIR" "$APP_DIR"

            cd "$APP_DIR"
            pm2 startOrReload ecosystem.config.cjs --only market-auctionsdev
            pm2 startOrReload ecosystem.config.cjs --only market-contextvm-auctionsdev
            pm2 save --force

            grep -q 'auctionsdev\.plebeian\.market' /home/deployer/Caddyfile.staging
            sudo cp /home/deployer/Caddyfile.staging /etc/caddy/Caddyfile
            sudo mkdir -p /var/log/caddy
            sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || \
              sudo caddy start --config /etc/caddy/Caddyfile --adapter caddyfile
            grep -q 'auctionsdev\.plebeian\.market' /etc/caddy/Caddyfile

            curl -sf http://localhost:3002/api/config >/dev/null

            # CVM server liveness — no HTTP surface, so we tail PM2's
            # status. PM2 reports `online` once the bun process is up;
            # the SDK's `Server is running` log marker comes a few
            # seconds later but isn't required for liveness here.
            for i in $(seq 1 15); do
              if pm2 describe market-contextvm-auctionsdev 2>/dev/null | grep -q 'status .* online'; then
                echo "CVM server is online"
                break
              fi
              sleep 1
              if [ "$i" = "15" ]; then
                echo "CVM server failed to come online; recent logs:"
                pm2 logs market-contextvm-auctionsdev --lines 50 --nostream || true
                exit 1
              fi
            done

            cd /home/deployer/releases
            ls -t | grep '^market-auctionsdev' | tail -n +4 | xargs -r rm -rf

            rm -f "$CADDY_BACKUP"
            trap - ERR

            echo "✅ AuctionsDev deployment complete"

      - name: Health check
        run: |
          sleep 10
          curl -sf https://auctionsdev.plebeian.market/api/config
          echo "✅ AuctionsDev health check passed"
