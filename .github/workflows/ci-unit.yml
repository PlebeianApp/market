name: Unit and Integration Tests

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for hardcoded Nostr keys and secrets
        run: bash scripts/git-hooks/pre-commit --full-repo

  unit-integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '>=1.22'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate routes
        run: bun run generate-routes

      - name: Run unit tests
        run: bun run test:unit

      - name: Run integration tests with local relay and currency server
        run: |
          set -euo pipefail

          go install github.com/fiatjaf/nak@latest

          cleanup() {
            if [ -n "${SERVER_PID:-}" ] && kill -0 "$SERVER_PID" 2>/dev/null; then
              kill "$SERVER_PID" || true
            fi
            if [ -n "${RELAY_PID:-}" ] && kill -0 "$RELAY_PID" 2>/dev/null; then
              kill "$RELAY_PID" || true
            fi
          }
          trap cleanup EXIT

          nohup "$HOME/go/bin/nak" serve --hostname 0.0.0.0 > /tmp/relay.log 2>&1 &
          RELAY_PID=$!

          CVM_SERVER_KEY=$("$HOME/go/bin/nak" key generate | head -1)
          echo "Generated ephemeral CVM_SERVER_KEY"
          export CVM_SERVER_KEY

          NODE_ENV=development APP_RELAY_URL=ws://localhost:10547 nohup bun run contextvm/server.ts > /tmp/currency-server.log 2>&1 &
          SERVER_PID=$!

          echo "Waiting for relay on port 10547..."
          for i in $(seq 1 20); do
            if (echo > /dev/tcp/localhost/10547) 2>/dev/null; then
              echo "Relay is ready"
              break
            fi
            sleep 1
          done

          echo "Probing currency server readiness..."
          for i in $(seq 1 20); do
            if bun run scripts/fetch-btc-price.ts ws://localhost:10547 > /tmp/currency-probe.log 2>&1; then
              echo "Currency server is ready"
              break
            fi
            sleep 1
            if [ "$i" -eq 20 ]; then
              echo "::error::Currency server failed readiness probe"
              cat /tmp/relay.log || true
              cat /tmp/currency-server.log || true
              cat /tmp/currency-probe.log || true
              exit 1
            fi
          done

          bun run test:integration

      - name: Show integration logs on failure
        if: failure()
        run: |
          echo "=== Relay logs ==="
          cat /tmp/relay.log 2>/dev/null || echo "(no relay log)"
          echo ""
          echo "=== Currency server logs ==="
          cat /tmp/currency-server.log 2>/dev/null || echo "(no currency server log)"
          echo ""
          echo "=== Currency server probe logs ==="
          cat /tmp/currency-probe.log 2>/dev/null || echo "(no currency probe log)"
