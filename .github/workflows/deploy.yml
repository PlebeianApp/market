name: Deploy

on:
  workflow_run:
    workflows:
      - E2E Tests
    types:
      - completed
  workflow_dispatch:

env:
  BUN_VERSION: 'latest'
  STAGING_BRANCH: master
  AUCTIONSDEV_BRANCH: feature/nut-auctions-rebase

concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve deployment target
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.target.outputs.should_deploy }}
      deploy_name: ${{ steps.target.outputs.deploy_name }}
      release_prefix: ${{ steps.target.outputs.release_prefix }}
      pm2_app_name: ${{ steps.target.outputs.pm2_app_name }}
      app_dir: ${{ steps.target.outputs.app_dir }}
      app_port: ${{ steps.target.outputs.app_port }}
      healthcheck_url: ${{ steps.target.outputs.healthcheck_url }}
      branch_name: ${{ steps.target.outputs.branch_name }}

    steps:
      - name: Resolve branch deployment config
        id: target
        env:
          BRANCH_NAME: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          case "$BRANCH_NAME" in
            "$STAGING_BRANCH")
              {
                echo "should_deploy=true"
                echo "deploy_name=staging"
                echo "release_prefix=market-staging"
                echo "pm2_app_name=market-staging"
                echo "app_dir=/home/deployer/market-staging"
                echo "app_port=3000"
                echo "healthcheck_url=https://staging.plebeian.market/api/config"
              } >> "$GITHUB_OUTPUT"
              ;;
            "$AUCTIONSDEV_BRANCH")
              {
                echo "should_deploy=true"
                echo "deploy_name=auctionsdev"
                echo "release_prefix=market-auctionsdev"
                echo "pm2_app_name=market-auctionsdev"
                echo "app_dir=/home/deployer/market-auctionsdev"
                echo "app_port=3002"
                echo "healthcheck_url=https://auctionsdev.plebeian.market/api/config"
              } >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build:
    name: Build
    needs: prepare
    if: needs.prepare.outputs.should_deploy == 'true' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'))
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.release.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: |
          bun run generate-routes
          bun run build

      - name: Generate release name
        id: release
        run: echo "name=${{ needs.prepare.outputs.release_prefix }}-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp -r src deploy-package/
          cp package.json bun.lock tsconfig.json deploy-package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy-package/
          retention-days: 1

  deploy:
    name: Deploy
    needs: [prepare, build]
    if: needs.prepare.outputs.should_deploy == 'true' && (github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'))
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package
          path: deploy-package/

      - name: Create ecosystem config
        run: |
          cat > deploy-package/ecosystem.config.cjs << 'EOF'
          module.exports = {
            apps: [{
              name: '${{ needs.prepare.outputs.pm2_app_name }}',
              script: 'src/index.tsx',
              interpreter: process.env.HOME + '/.bun/bin/bun',
              cwd: '${{ needs.prepare.outputs.app_dir }}',
              instances: 1,
              exec_mode: 'fork',
              env_file: '.env',
              error_file: '/home/deployer/logs/${{ needs.prepare.outputs.pm2_app_name }}-error.log',
              out_file: '/home/deployer/logs/${{ needs.prepare.outputs.pm2_app_name }}-out.log',
              log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
              merge_logs: true,
              autorestart: true,
              max_restarts: 10,
              min_uptime: '10s',
              restart_delay: 5000,
              max_memory_restart: '500M',
              kill_timeout: 5000,
              wait_ready: true,
              listen_timeout: 10000,
            }],
          };
          EOF

      - name: Create environment file
        run: |
          cat > deploy-package/.env << EOF
          APP_STAGE=staging
          NODE_ENV=production
          PORT=${{ needs.prepare.outputs.app_port }}
          APP_RELAY_URL=${{ secrets.STAGING_RELAY_URL }}
          APP_PRIVATE_KEY=${{ secrets.STAGING_APP_PRIVATE_KEY }}
          NIP46_RELAY_URL=wss://relay.nsec.app
          EOF

      - name: Prepare server directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            mkdir -p ~/releases ~/logs
            chmod 755 ~
            rm -rf /tmp/deploy-package

      - name: Upload files to tmp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          source: 'deploy-package/*'
          target: '/tmp/deploy-package'
          strip_components: 1

      - name: Upload Caddyfile
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          source: 'deploy-simple/caddyfiles/Caddyfile.staging'
          target: '/tmp'
          strip_components: 2

      - name: Move files to release directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            mv /tmp/deploy-package ~/releases/${{ needs.build.outputs.release_name }}

      - name: Activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          password: ${{ secrets.STAGING_PASSWORD }}
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/deployer/releases/${{ needs.build.outputs.release_name }}"
            APP_DIR="${{ needs.prepare.outputs.app_dir }}"
            PM2_APP_NAME="${{ needs.prepare.outputs.pm2_app_name }}"
            RELEASE_PREFIX="${{ needs.prepare.outputs.release_prefix }}"
            PREVIOUS_RELEASE="$(readlink -f "$APP_DIR" || true)"
            CADDY_BACKUP="$(mktemp)"
            sudo cp /etc/caddy/Caddyfile "$CADDY_BACKUP" 2>/dev/null || true

            rollback() {
              echo "Deployment failed, restoring previous release"
              if [[ -f "$CADDY_BACKUP" ]]; then
                sudo cp "$CADDY_BACKUP" /etc/caddy/Caddyfile || true
                sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true
              fi
              if [[ -n "$PREVIOUS_RELEASE" && -d "$PREVIOUS_RELEASE" ]]; then
                ln -sfn "$PREVIOUS_RELEASE" "$APP_DIR"
                cd "$APP_DIR"
                pm2 startOrReload ecosystem.config.cjs --only "$PM2_APP_NAME" || true
                pm2 save --force || true
              fi
            }

            trap rollback ERR

            # Install dependencies
            cd "$RELEASE_DIR"
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --production

            # Stop current version
            pm2 stop "$PM2_APP_NAME" 2>/dev/null || true

            # Swap symlink (blue-green)
            ln -sfn "$RELEASE_DIR" "$APP_DIR"

            # Start new version with PM2
            cd "$APP_DIR"
            pm2 startOrReload ecosystem.config.cjs --only "$PM2_APP_NAME"
            pm2 save --force

            # Update Caddy
            sudo cp /tmp/Caddyfile.staging /etc/caddy/Caddyfile
            sudo mkdir -p /var/log/caddy
            sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || \
              sudo caddy start --config /etc/caddy/Caddyfile --adapter caddyfile

            # Cleanup old releases (keep last 3)
            cd /home/deployer/releases
            ls -t | grep "^$RELEASE_PREFIX" | tail -n +4 | xargs -r rm -rf

            rm -f "$CADDY_BACKUP"
            trap - ERR

            echo "✅ Deployment complete for $PM2_APP_NAME"

      - name: Health check
        run: |
          sleep 10
          curl -sf ${{ needs.prepare.outputs.healthcheck_url }}
          echo "✅ Health check passed"
