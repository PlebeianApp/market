name: NDK Footprint Guard

# Prevents new @nostr-dev-kit usage while the NDK -> applesauce migration
# (docs/ndk-to-applesauce-migration-plan.md) is in progress. New relay I/O
# must route through src/lib/nostr/io.ts instead.

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'chore/**'
      - 'fix/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  footprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check NDK footprint
        run: bash scripts/check-ndk-footprint.sh
