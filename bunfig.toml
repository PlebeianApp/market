[serve.static]
plugins = ["bun-plugin-tailwind"]
env = "BUN_PUBLIC_*"

[test]
# Exclude Playwright e2e spec files from bun test runner.
# These use Playwright's test runner API (test.use(), test.describe())
# which bun:test doesn't understand, causing spurious failures
# when the pre-push hook runs `bun test` and picks up *.spec.ts files.
exclude = ["e2e/**", "node_modules/**", "**/*.spec.ts"]
